<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroVision | Zodiac</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#05040f; --panel:#0c0b1e; --border:rgba(180,150,255,.15); --gold:#c9a84c; --gold-light:#f0d080; --violet:#7b5ea7; --violet-bright:#b97fff; --text:#e8e0f0; --text-dim:#9080b0; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Cormorant Garamond',serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 70% 15%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 55% 80%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 40% 5%,rgba(255,235,180,.8) 0%,transparent 100%);pointer-events:none;z-index:0;}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 30%,rgba(80,40,120,.25) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 80% 70%,rgba(40,20,100,.2) 0%,transparent 70%);pointer-events:none;z-index:0;}

    .navbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);background:rgba(5,4,15,.85);backdrop-filter:blur(12px);}
    .logo{font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--gold-light);letter-spacing:.08em;text-decoration:none;text-shadow:0 0 20px rgba(201,168,76,.4);}
    .nav-links{display:flex;gap:4px;flex-wrap:wrap;}
    .nav-links a{color:var(--text-dim);text-decoration:none;font-family:'Cinzel Decorative',serif;font-size:.62rem;letter-spacing:.1em;padding:8px 13px;border-radius:4px;border:1px solid transparent;transition:all .25s;}
    .nav-links a:hover,.nav-links a.active{color:var(--gold-light);border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.08);}

    .container{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:50px 18px 100px;}
    header{text-align:center;margin-bottom:50px;animation:fadeDown 1s ease both;}
    .header-ornament{font-size:2rem;color:var(--gold);letter-spacing:1rem;opacity:.7;display:block;margin-bottom:12px;animation:shimmer 4s ease-in-out infinite alternate;}
    @keyframes shimmer{from{opacity:.5;text-shadow:none;}to{opacity:1;text-shadow:0 0 20px var(--gold-light);}}
    h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:700;background:linear-gradient(135deg,var(--gold-light) 0%,var(--violet-bright) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
    .subtitle{font-size:1.1rem;color:var(--text-dim);font-style:italic;margin-top:10px;letter-spacing:.12em;}

    .panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:40px;position:relative;overflow:hidden;animation:fadeUp .6s ease both;}
    .panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--violet-bright),var(--gold),transparent);opacity:.6;}
    .panel-title{font-family:'Cinzel Decorative',serif;font-size:.9rem;color:var(--gold);letter-spacing:.12em;margin-bottom:28px;display:flex;align-items:center;gap:12px;}
    .panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);opacity:.4;}

    .sign-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
    .sign-card{border:1px solid var(--border);border-radius:5px;padding:12px 10px;text-align:center;cursor:pointer;transition:all .25s;background:transparent;color:var(--text-dim);font-family:'Cormorant Garamond',serif;}
    .sign-card:hover{border-color:var(--violet);color:var(--text);background:rgba(123,94,167,.1);transform:translateY(-2px);}
    .sign-card.selected{border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,.08);box-shadow:0 0 15px rgba(201,168,76,.15);}
    .sign-card .card-symbol{font-size:1.4rem;display:block;margin-bottom:4px;}
    .sign-card .card-name{font-size:.75rem;letter-spacing:.05em;}

    .btn{width:100%;padding:16px;background:linear-gradient(135deg,rgba(123,94,167,.4),rgba(201,168,76,.2));border:1px solid rgba(201,168,76,.4);border-radius:4px;color:var(--gold-light);font-family:'Cinzel Decorative',serif;font-size:.8rem;letter-spacing:.2em;cursor:pointer;transition:all .3s;}
    .btn:hover{border-color:var(--gold);box-shadow:0 0 25px rgba(201,168,76,.25);transform:translateY(-1px);}
    .btn:disabled{opacity:.65;cursor:not-allowed;transform:none;}

    .error-msg{color:#ff7777;font-size:.9rem;font-style:italic;margin-top:10px;display:none;}
    .error-msg.show{display:block;}

    .result{margin-top:32px;display:none;animation:revealResult .6s ease both;}
    .result.show{display:block;}
    @keyframes revealResult{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .result-sign-hero{text-align:center;margin-bottom:24px;}
    .result-symbol-big{font-size:3rem;display:block;margin-bottom:8px;color:var(--gold);animation:shimmer 3s ease-in-out infinite alternate;}
    .result-name{font-family:'Cinzel Decorative',serif;font-size:1.6rem;background:linear-gradient(135deg,var(--gold-light),var(--violet-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    .meta-row{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap;}
    .meta-chip{display:flex;align-items:center;gap:6px;padding:6px 16px;border:1px solid var(--border);border-radius:20px;font-size:.82rem;color:var(--text-dim);}
    .meta-chip .chip-label{font-family:'Cinzel Decorative',serif;font-size:.55rem;letter-spacing:.15em;color:var(--gold);display:block;}

    .traits-box{margin-top:20px;padding:20px;border:1px solid rgba(185,127,255,.15);border-radius:6px;background:rgba(123,94,167,.05);font-size:1.05rem;color:var(--text-dim);font-style:italic;line-height:1.7;text-align:center;}

    @keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @media(max-width:600px){.sign-grid{grid-template-columns:repeat(3,1fr);}.navbar{padding:14px 20px;flex-direction:column;gap:12px;}.panel{padding:24px 18px;}}
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="logo" href="../index.html">✨ AstroVision</a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="zodiac.html" class="active">Zodiac</a>
      <a href="../compatibility/compatibility.html">Compatibility</a>
      <a href="../lucky/lucky_number.html">Lucky</a>
      <a href="../vastu/vastu.html">Vastu</a>
      <a href="../tarot_cards/tarot.html">Tarot</a>
    </div>
  </nav>

  <div class="container">
    <header>
      <span class="header-ornament">♈ ♎ ♌</span>
      <h1>Zodiac Explorer</h1>
      <p class="subtitle">Choose your sign to reveal element, ruling planet, and traits</p>
    </header>

    <div class="panel">
      <div class="panel-title">Select Your Sign</div>
      <div class="sign-grid" id="sign-grid"></div>
      <button class="btn" onclick="loadSign()">✦ Reveal Sign Profile ✦</button>
      <p class="error-msg" id="error-msg"></p>
      <div class="result" id="result">
        <div class="result-sign-hero">
          <span class="result-symbol-big" id="result-symbol"></span>
          <div class="result-name" id="result-name"></div>
        </div>
        <div class="meta-row">
          <div class="meta-chip">
            <div>
              <span class="chip-label">Element</span>
              <span id="result-element">—</span>
            </div>
          </div>
          <div class="meta-chip">
            <div>
              <span class="chip-label">Ruling Planet</span>
              <span id="result-planet">—</span>
            </div>
          </div>
        </div>
        <div class="traits-box" id="result-traits"></div>
      </div>
    </div>
  </div>

  <script>
    const SIGNS = [
      {name:"Aries",symbol:"♈"},{name:"Taurus",symbol:"♉"},{name:"Gemini",symbol:"♊"},
      {name:"Cancer",symbol:"♋"},{name:"Leo",symbol:"♌"},{name:"Virgo",symbol:"♍"},
      {name:"Libra",symbol:"♎"},{name:"Scorpio",symbol:"♏"},{name:"Sagittarius",symbol:"♐"},
      {name:"Capricorn",symbol:"♑"},{name:"Aquarius",symbol:"♒"},{name:"Pisces",symbol:"♓"}
    ];
    const API = 'http://localhost:8080';
    const grid = document.getElementById('sign-grid');
    let selected = null;

    SIGNS.forEach((s, i) => {
      const b = document.createElement('button');
      b.className = 'sign-card';
      b.innerHTML = `<span class="card-symbol">${s.symbol}</span><span class="card-name">${s.name}</span>`;
      b.onclick = () => {
        document.querySelectorAll('.sign-card').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected'); selected = i;
        document.getElementById('result').classList.remove('show');
        document.getElementById('error-msg').classList.remove('show');
      };
      grid.appendChild(b);
    });

    async function loadSign() {
      if (selected === null) { showErr('Please select a sign first.'); return; }
      const sign = SIGNS[selected];
      const btn = document.querySelector('.btn');
      btn.disabled = true; btn.textContent = '⟳ Reading the stars…';
      try {
        // Uses GET /explore/:sign — returns name, element, rulingPlanet, traits
        const res = await fetch(`${API}/explore/${sign.name}`);
        if (!res.ok) throw new Error(`Server responded with ${res.status}`);
        const data = await res.json();

        document.getElementById('result-symbol').textContent  = sign.symbol;
        document.getElementById('result-name').textContent    = data.name || sign.name;
        document.getElementById('result-element').textContent = data.element || '—';
        document.getElementById('result-planet').textContent  = data.rulingPlanet || '—';
        document.getElementById('result-traits').textContent  = data.traits || 'Traits unavailable.';

        const r = document.getElementById('result');
        r.classList.remove('show');
        requestAnimationFrame(() => r.classList.add('show'));
      } catch(e) {
        showErr('Cannot reach backend. Make sure astrovision.exe is running on port 8080.');
      } finally {
        btn.disabled = false; btn.textContent = '✦ Reveal Sign Profile ✦';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg; el.classList.add('show');
    }
  </script>
</body>
</html>
